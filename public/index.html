<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Product Launch OS</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace-panel" aria-labelledby="page-title" data-view="auth">
        <div class="topbar">
          <div class="status-row">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="system-status">正在检查系统状态...</span>
          </div>
          <button class="ghost-button hidden" id="logout-button" type="button">退出登录</button>
        </div>

        <div id="auth-view">
          <div class="hero split-hero">
            <div>
              <p class="eyebrow">卖家工作台</p>
              <h1 id="page-title">AI Product Launch OS</h1>
              <p class="lede">
                输入产品信息，生成市场分析、达人策略、脚本、合规、预测和备货建议。
              </p>
            </div>

            <form class="auth-card" id="auth-form">
              <div class="form-heading">
                <p class="label" id="form-mode-label">创建账号</p>
                <h2 id="form-title">进入打品工作台</h2>
              </div>

              <label class="field register-only">
                <span>姓名</span>
                <input id="name" name="name" autocomplete="name" placeholder="Alex Chen">
              </label>

              <label class="field register-only">
                <span>团队名称</span>
                <input id="workspace-name" name="workspaceName" placeholder="美国站打品团队">
              </label>

              <label class="field">
                <span>邮箱</span>
                <input id="email" name="email" type="email" autocomplete="email" placeholder="seller@example.com" required>
              </label>

              <label class="field">
                <span>密码</span>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="至少 8 位字符" required>
              </label>

              <p class="form-message" id="auth-message" role="status"></p>

              <button class="primary-button" id="submit-button" type="submit">创建账号</button>
              <button class="link-button" id="mode-toggle" type="button">已有账号？登录</button>
            </form>
          </div>
        </div>

        <div class="hidden app-layout" id="app-view">
          <div class="app-header">
            <div>
              <p class="eyebrow">工作台</p>
              <h1 id="workspace-title">打品工作台</h1>
              <p class="lede compact" id="workspace-subtitle">正在加载工作台...</p>
            </div>
            <button class="primary-action" id="new-project-button" type="button">新建产品</button>
          </div>

          <nav class="app-nav" aria-label="Primary">
            <button class="nav-item is-active" type="button" data-target-view="dashboard-panel">总览</button>
            <button class="nav-item" type="button" data-target-view="projects-panel">项目</button>
            <button class="nav-item" type="button" data-target-view="create-panel">新建</button>
          </nav>

          <div class="dashboard-panel" id="dashboard-panel">
            <div class="metric-grid" aria-label="Workspace metrics">
              <article class="metric-card">
                <span>项目总数</span>
                <strong id="metric-total">0</strong>
                <p>当前工作台中的打品项目。</p>
              </article>
              <article class="metric-card">
                <span>草稿</span>
                <strong id="metric-draft">0</strong>
                <p>等待补充信息或生成报告的项目。</p>
              </article>
              <article class="metric-card">
                <span>已完成报告</span>
                <strong id="metric-completed">0</strong>
                <p>可直接查看和编辑的打品报告。</p>
              </article>
            </div>

            <section class="list-section" aria-labelledby="recent-projects-title">
              <div class="section-heading">
                <div>
                  <p class="label">产品项目</p>
                  <h2 id="recent-projects-title">最近项目</h2>
                </div>
                <button class="ghost-button" type="button" data-open-create>新建产品</button>
              </div>

              <div id="project-list"></div>
            </section>
          </div>

          <div class="dashboard-panel hidden" id="projects-panel">
            <section class="list-section" aria-labelledby="all-projects-title">
              <div class="section-heading">
                <div>
                  <p class="label">全部项目</p>
                  <h2 id="all-projects-title">产品项目列表</h2>
                </div>
                <button class="ghost-button" type="button" data-open-create>新建产品</button>
              </div>

              <div id="project-list-full"></div>
            </section>
          </div>

          <div class="dashboard-panel hidden" id="create-panel">
            <section class="list-section" aria-labelledby="create-project-title">
              <div class="section-heading">
                <div>
                  <p class="label">新产品</p>
                  <h2 id="create-project-title">创建产品项目</h2>
                </div>
              </div>

              <form class="project-form" id="project-form">
                <label class="field span-2">
                  <span>产品名称</span>
                  <input name="productName" placeholder="便携榨汁机" required>
                </label>

                <label class="field">
                  <span>类目</span>
                  <input name="category" placeholder="厨房小家电">
                </label>

                <label class="field">
                  <span>目标市场</span>
                  <input name="targetMarket" value="美国">
                </label>

                <fieldset class="platform-field span-2">
                  <legend>销售平台</legend>
                  <label><input type="checkbox" name="platforms" value="TikTok" checked> TikTok</label>
                  <label><input type="checkbox" name="platforms" value="Amazon"> Amazon</label>
                  <label><input type="checkbox" name="platforms" value="Walmart"> Walmart</label>
                </fieldset>

                <label class="field span-2">
                  <span>竞品链接</span>
                  <textarea name="competitorLinks" rows="3" placeholder="每行一个 TikTok / Amazon / Walmart 竞品链接"></textarea>
                </label>

                <label class="field">
                  <span>目标售价</span>
                  <input name="targetPrice" type="number" min="0" step="0.01" placeholder="29.99">
                </label>

                <label class="field">
                  <span>成本价</span>
                  <input name="costPrice" type="number" min="0" step="0.01" placeholder="9.50">
                </label>

                <label class="field">
                  <span>当前库存</span>
                  <input name="inventory" type="number" min="0" step="1" placeholder="500">
                </label>

                <label class="field">
                  <span>补货周期（天）</span>
                  <input name="leadTimeDays" type="number" min="0" step="1" placeholder="21">
                </label>

                <p class="form-message span-2" id="project-message" role="status"></p>

                <div class="form-actions span-2">
                  <button class="primary-action" type="submit">创建项目</button>
                  <button class="ghost-button" type="button" id="cancel-create-button">返回总览</button>
                </div>
              </form>
            </section>
          </div>

          <div class="dashboard-panel hidden" id="detail-panel">
            <section class="list-section" aria-labelledby="project-detail-title">
              <div class="section-heading">
                <div>
                  <p class="label">项目详情</p>
                  <h2 id="project-detail-title">产品项目</h2>
                </div>
                <div class="section-actions">
                  <button class="primary-action" type="button" id="generate-report-button">生成报告</button>
                  <button class="ghost-button" type="button" id="view-report-button">查看报告</button>
                  <button class="ghost-button" type="button" id="back-to-projects-button">返回项目</button>
                </div>
              </div>

              <p class="form-message" id="report-message" role="status"></p>
              <div class="detail-grid" id="project-detail"></div>
            </section>
          </div>

          <div class="dashboard-panel hidden" id="report-panel">
            <section class="list-section" aria-labelledby="report-title">
              <div class="section-heading">
                <div>
                  <p class="label">打品报告</p>
                  <h2 id="report-title">报告</h2>
                </div>
                <button class="ghost-button" type="button" id="back-to-detail-button">返回项目</button>
              </div>

              <div class="report-summary" id="report-summary"></div>
              <div class="report-workspace">
                <aside class="report-module-nav" aria-label="Report modules" id="report-module-nav"></aside>
                <div class="report-sections" id="report-sections"></div>
              </div>
            </section>
          </div>

          <div class="next-card sprint-card">
            <div>
              <p class="label">当前版本</p>
              <strong>产品指纹和真实模型配置已上线</strong>
            </div>
            <a href="/api/product-projects" target="_blank" rel="noreferrer">查看项目 API</a>
          </div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
